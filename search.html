<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Search — Newzyy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="plugins/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="plugins/font-awesome/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&display=swap" rel="stylesheet">
    <style>
        :root { --red:#b80000; --ink:#141414; --paper:#ffffff; --canvas:#f7f6f2; --hairline:#e3ded3; --muted:#6e6a62;
            --sans:'Inter',sans-serif; --serif:'Source Serif 4',Georgia,serif; }
        :root[data-theme="dark"] { --ink:#f0ede6; --paper:#17150f; --canvas:#0f0d09; --hairline:#2c2820; --muted:#9c9689; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--sans); background:var(--canvas); color:var(--ink); }
        a { text-decoration:none; color:inherit; }
        .bbc-header { background:var(--paper); border-bottom:1px solid var(--hairline); padding:16px 0; }
        .site-logo { font-size:1.8rem; font-weight:900; color:var(--ink); }
        .site-logo span { color:var(--red); }
        .theme-toggle { background:none; border:1px solid var(--hairline); border-radius:50%; width:30px; height:30px; cursor:pointer; color:var(--ink); }
        .bbc-nav { background:var(--paper); border-bottom:1px solid var(--hairline); }
        .bbc-nav a { font-size:0.72rem; font-weight:600; padding:12px 16px; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); display:inline-block; }
        .search-hero { max-width:700px; margin:0 auto; padding:40px 20px 10px; }
        .search-hero h1 { font-family:var(--serif); font-size:1.8rem; margin-bottom:16px; }
        .search-box { position:relative; }
        .search-box input { width:100%; padding:14px 18px 14px 44px; border:1.5px solid var(--hairline); font-size:1rem; font-family:var(--sans); background:var(--paper); color:var(--ink); }
        .search-box input:focus { outline:none; border-color:var(--red); }
        .search-box i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted); }
        .result-count { font-size:0.85rem; color:var(--muted); margin:16px 0; }
        .results-wrap { max-width:900px; margin:0 auto; padding:0 20px 60px; }
        .result-card { display:flex; gap:20px; padding:20px 0; border-bottom:1px solid var(--hairline); cursor:pointer; }
        .result-card img { width:140px; height:100px; object-fit:cover; flex-shrink:0; }
        .result-card .cat { font-size:0.65rem; font-weight:800; text-transform:uppercase; }
        .result-card .title { font-family:var(--serif); font-size:1.15rem; font-weight:700; margin:6px 0; }
        .result-card:hover .title { color:var(--red); }
        .result-card .excerpt { font-size:0.88rem; color:var(--muted); }
        .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
        .bbc-footer { background:var(--ink); color:#ccc; padding:40px 0 20px; margin-top:40px; border-top:3px solid var(--red); }
        .bbc-footer a { color:#ccc; font-size:0.85rem; }
        .bbc-footer .links { display:flex; flex-wrap:wrap; justify-content:center; gap:24px; }
        .bbc-footer .copyright { font-size:0.75rem; color:#666; margin-top:20px; text-align:center; }
        @media (max-width:600px){ .result-card{flex-direction:column;} .result-card img{width:100%;height:160px;} }
    </style>
</head>
<body>

<header class="bbc-header">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/" class="site-logo">Newzy<span>y</span></a>
        <button class="theme-toggle" id="themeToggle"><i class="fa fa-moon-o"></i></button>
    </div>
</header>
<nav class="bbc-nav"><div class="container"><a href="/">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a></div></nav>

<div class="search-hero">
    <h1>Search Newzyy</h1>
    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search articles..." autocomplete="off">
    </div>
    <div class="result-count" id="resultCount"></div>
</div>

<div class="results-wrap" id="resultsWrap"></div>

<footer class="bbc-footer">
    <div class="container">
        <div class="links">
            <a href="/">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a><a href="terms.html">Terms</a>
        </div>
        <div class="copyright">2026 Newzyy — Independent Journalism</div>
    </div>
</footer>

<script>
const API_BASE = 'https://newzyy.onrender.com';
const CATEGORY_COLORS = { politics:'#b80000', technology:'#2563eb', ai:'#9333ea', sports:'#16a34a', business:'#7c3aed',
    health:'#0891b2', science:'#d97706', entertainment:'#dc2626', travel:'#0ea5e9', environment:'#22c55e',
    culture:'#8b5cf6', world:'#3b82f6', economy:'#f59e0e' };
const CATEGORY_NAMES = { politics:'Politics', technology:'Technology', ai:'AI', sports:'Sports', business:'Business',
    health:'Health', science:'Science', entertainment:'Entertainment', travel:'Travel', environment:'Earth',
    culture:'Culture', world:'World', economy:'Economy' };

function openNews(id) { window.location.href = 'single-post.html?id=' + id; }

async function runSearch(q) {
    const wrap = document.getElementById('resultsWrap');
    const countEl = document.getElementById('resultCount');
    if (!q || q.trim().length < 2) {
        wrap.innerHTML = '';
        countEl.textContent = '';
        return;
    }
    wrap.innerHTML = '<div class="empty-state">Searching...</div>';
    try {
        const res = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        const items = data.news || [];
        countEl.textContent = items.length ? `${items.length} result${items.length !== 1 ? 's' : ''} for "${q}"` : '';
        if (!items.length) {
            wrap.innerHTML = `<div class="empty-state">No results for "${q}". Try a different search term.</div>`;
            return;
        }
        wrap.innerHTML = items.map(a => `
            <div class="result-card" onclick="openNews('${a.id}')">
                <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=300'">
                <div>
                    <span class="cat" style="color:${CATEGORY_COLORS[a.category] || '#b80000'}">${CATEGORY_NAMES[a.category] || a.category}</span>
                    <div class="title">${a.title}</div>
                    <div class="excerpt">${(a.excerpt || '').substring(0, 140)}...</div>
                </div>
            </div>
        `).join('');
    } catch (e) {
        wrap.innerHTML = '<div class="empty-state">Something went wrong. Please try again.</div>';
    }
}

let debounce;
document.getElementById('searchInput').addEventListener('input', function(e) {
    clearTimeout(debounce);
    debounce = setTimeout(() => runSearch(e.target.value), 350);
});

document.addEventListener('DOMContentLoaded', function() {
    const saved = localStorage.getItem('newzyy_theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    const btn = document.getElementById('themeToggle');
    btn.innerHTML = saved === 'dark' ? '<i class="fa fa-sun-o"></i>' : '<i class="fa fa-moon-o"></i>';
    btn.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('newzyy_theme', next);
        btn.innerHTML = next === 'dark' ? '<i class="fa fa-sun-o"></i>' : '<i class="fa fa-moon-o"></i>';
    });

    const params = new URLSearchParams(window.location.search);
    const q = params.get('q') || params.get('search') || '';
    if (q) {
        document.getElementById('searchInput').value = q;
        runSearch(q);
    }
});
</script>
</body>
</html>
