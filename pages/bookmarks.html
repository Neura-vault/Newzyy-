<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My Bookmarks — Newzyy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="plugins/font-awesome/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&display=swap" rel="stylesheet">
    <style>
        :root { --red:#b80000; --ink:#141414; --paper:#ffffff; --canvas:#f7f6f2; --hairline:#e3ded3; --muted:#6e6a62;
            --sans:'Inter',sans-serif; --serif:'Source Serif 4',Georgia,serif; }
        :root[data-theme="dark"] { --ink:#f0ede6; --paper:#17150f; --canvas:#0f0d09; --hairline:#2c2820; --muted:#9c9689; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--sans); background:var(--canvas); color:var(--ink); }
        a { text-decoration:none; color:inherit; }
        .bbc-header { background:var(--paper); border-bottom:1px solid var(--hairline); padding:16px 0; }
        .site-logo { font-size:1.8rem; font-weight:900; color:var(--ink); }
        .site-logo span { color:var(--red); }
        .theme-toggle { background:none; border:1px solid var(--hairline); border-radius:50%; width:30px; height:30px; cursor:pointer; color:var(--ink); }
        .bbc-nav { background:var(--paper); border-bottom:1px solid var(--hairline); }
        .bbc-nav a { font-size:0.72rem; font-weight:600; padding:12px 16px; text-transform:uppercase; letter-spacing:0.4px; color:var(--muted); display:inline-block; }
        .page-wrap { max-width:900px; margin:0 auto; padding:40px 20px 70px; }
        .page-wrap h1 { font-family:var(--serif); font-size:2rem; margin-bottom:24px; }
        .bookmark-card { display:flex; gap:20px; padding:20px 0; border-bottom:1px solid var(--hairline); cursor:pointer; }
        .bookmark-card img { width:150px; height:105px; object-fit:cover; flex-shrink:0; }
        .bookmark-card .cat { font-size:0.65rem; font-weight:800; text-transform:uppercase; }
        .bookmark-card .title { font-family:var(--serif); font-size:1.15rem; font-weight:700; margin:6px 0; }
        .bookmark-card:hover .title { color:var(--red); }
        .bookmark-card .meta { font-size:0.75rem; color:var(--muted); }
        .bookmark-card .remove-btn { background:none; border:1px solid var(--hairline); padding:6px 14px; font-size:0.75rem; cursor:pointer; align-self:flex-start; margin-left:auto; }
        .bookmark-card .remove-btn:hover { border-color:var(--red); color:var(--red); }
        .empty-state { text-align:center; padding:80px 20px; color:var(--muted); }
        .empty-state a { color:var(--red); font-weight:700; }
        .bbc-footer { background:var(--ink); color:#ccc; padding:40px 0 20px; margin-top:40px; border-top:3px solid var(--red); }
        .bbc-footer .links { display:flex; flex-wrap:wrap; justify-content:center; gap:24px; }
        .bbc-footer a { color:#ccc; font-size:0.85rem; }
        .bbc-footer .copyright { font-size:0.75rem; color:#666; margin-top:20px; text-align:center; }
        @media (max-width:600px){ .bookmark-card{flex-direction:column;} .bookmark-card img{width:100%;height:160px;} .bookmark-card .remove-btn{margin-left:0;} }
    </style>
</head>
<body>

<header class="bbc-header">
    <div class="container d-flex justify-content-between align-items-center" style="display:flex;justify-content:space-between;align-items:center;">
        <a href="index.html" class="site-logo">Newzy<span>y</span></a>
        <button class="theme-toggle" id="themeToggle"><i class="fa fa-moon-o"></i></button>
    </div>
</header>
<nav class="bbc-nav"><div class="container"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a></div></nav>

<div class="page-wrap">
    <h1>My Bookmarks</h1>
    <div id="bookmarksRoot"><p style="color:var(--muted);">Loading...</p></div>
</div>

<footer class="bbc-footer">
    <div class="container">
        <div class="links">
            <a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy</a><a href="terms.html">Terms</a>
        </div>
        <div class="copyright">2026 Newzyy — Independent Journalism</div>
    </div>
</footer>

<script>
const API_BASE = 'https://newzyy.onrender.com';
const CATEGORY_COLORS = { politics:'#b80000', technology:'#2563eb', ai:'#9333ea', sports:'#16a34a', business:'#7c3aed',
    health:'#0891b2', science:'#d97706', entertainment:'#dc2626', travel:'#0ea5e9', environment:'#22c55e',
    culture:'#8b5cf6', world:'#3b82f6', economy:'#f59e0e' };
const CATEGORY_NAMES = { politics:'Politics', technology:'Technology', ai:'AI', sports:'Sports', business:'Business',
    health:'Health', science:'Science', entertainment:'Entertainment', travel:'Travel', environment:'Earth',
    culture:'Culture', world:'World', economy:'Economy' };

function openNews(id) { window.location.href = 'single-post.html?id=' + id; }

async function loadBookmarks() {
    const token = localStorage.getItem('newzyy_token');
    const root = document.getElementById('bookmarksRoot');

    if (!token) {
        root.innerHTML = `<div class="empty-state">Please <a href="account.html">log in</a> to see your saved articles.</div>`;
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/bookmarks`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();

        if (!data.success) {
            root.innerHTML = `<div class="empty-state">Your session expired. Please <a href="account.html">log in</a> again.</div>`;
            return;
        }
        const items = data.news || [];
        if (!items.length) {
            root.innerHTML = `<div class="empty-state">No bookmarks yet. Save articles from any story page.</div>`;
            return;
        }
        root.innerHTML = items.map(a => `
            <div class="bookmark-card">
                <img onclick="openNews('${a.id}')" src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=300'">
                <div style="flex:1;" onclick="openNews('${a.id}')">
                    <span class="cat" style="color:${CATEGORY_COLORS[a.category] || '#b80000'}">${CATEGORY_NAMES[a.category] || a.category}</span>
                    <div class="title">${a.title}</div>
                    <div class="meta">${a.time || ''}</div>
                </div>
                <button class="remove-btn" onclick="removeBookmark('${a.id}')">Remove</button>
            </div>
        `).join('');
    } catch (e) {
        root.innerHTML = `<div class="empty-state">Could not load your bookmarks. Please try again.</div>`;
    }
}

async function removeBookmark(id) {
    const token = localStorage.getItem('newzyy_token');
    if (!token) return;
    try {
        await fetch(`${API_BASE}/api/bookmarks/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        loadBookmarks();
    } catch (e) { /* silent — user can retry */ }
}

document.addEventListener('DOMContentLoaded', function() {
    const saved = localStorage.getItem('newzyy_theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    const btn = document.getElementById('themeToggle');
    btn.innerHTML = saved === 'dark' ? '<i class="fa fa-sun-o"></i>' : '<i class="fa fa-moon-o"></i>';
    btn.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('newzyy_theme', next);
        btn.innerHTML = next === 'dark' ? '<i class="fa fa-sun-o"></i>' : '<i class="fa fa-moon-o"></i>';
    });
    loadBookmarks();
});
</script>
</body>
</html>
