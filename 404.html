<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Page Not Found — Newzyy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="plugins/font-awesome/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Source+Serif+4:opsz,wght@8..60,700&display=swap" rel="stylesheet">
    <style>
        :root { --red:#b80000; --ink:#141414; --paper:#ffffff; --canvas:#f7f6f2; --hairline:#e3ded3; --muted:#6e6a62;
            --sans:'Inter',sans-serif; --serif:'Source Serif 4',Georgia,serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--sans); background:var(--canvas); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        a { color:var(--red); font-weight:700; text-decoration:none; }
        .code { font-family:var(--serif); font-size:6rem; font-weight:700; color:var(--red); line-height:1; }
        h1 { font-family:var(--serif); font-size:1.6rem; margin:14px 0 10px; }
        p { color:var(--muted); margin-bottom:24px; max-width:400px; }
        .btn { display:inline-block; padding:12px 32px; border:1.5px solid var(--red); text-transform:uppercase; font-size:0.8rem; letter-spacing:0.5px; }
        .btn:hover { background:var(--red); color:#fff; }
        .logo { position:absolute; top:24px; left:24px; font-size:1.3rem; font-weight:900; }
        .logo span { color:var(--red); }
    </style>
</head>
<body>
    <a href="index.html" class="logo">Newzy<span>y</span></a>
    <div class="code">404</div>
    <h1>This page doesn't exist</h1>
    <p>The story or page you're looking for may have been moved, renamed, or never existed. Let's get you back to the news.</p>
    <a href="index.html" class="btn">← Back to Newzyy Home</a>
</body>
</html>
