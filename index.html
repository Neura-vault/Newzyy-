<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Newzyy - Top World News</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-name" content="Newzyy" />

    <!--Favicon-->
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    
    <!-- THEME CSS -->
    <link rel="stylesheet" href="plugins/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="plugins/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="plugins/slick-carousel/slick.css">
    <link rel="stylesheet" href="plugins/slick-carousel/slick-theme.css">
    <link rel="stylesheet" href="css/style.css?v=3">
    
    <style>
        /* ===== NEWZYY CUSTOM STYLES (BBC-Inspired) ===== */
        
        /* 1. Root Variables */
        :root {
            --newzyy-red: #e8380d;
            --newzyy-dark: #0a0a0a;
            --newzyy-light: #f5f5f0;
            --newzyy-card: #ffffff;
            --newzyy-border: #e8e4df;
            --newzyy-text: #0a0a0a;
            --newzyy-muted: #6a6a6a;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background: var(--newzyy-light);
            color: var(--newzyy-text);
        }
        
        /* 2. BBC-Inspired Header */
        .n-header {
            background: var(--newzyy-dark);
            padding: 12px 0;
            border-bottom: 3px solid var(--newzyy-red);
        }
        .n-header .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        .n-header .logo span { color: var(--newzyy-red); }
        .n-header .logo small { font-size: 0.6rem; font-weight: 400; color: #888; margin-left: 4px; }
        .n-header .search-input {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 6px 16px;
            color: #ffffff;
            font-size: 0.85rem;
            width: 200px;
            outline: none;
            transition: 0.3s;
        }
        .n-header .search-input:focus {
            border-color: var(--newzyy-red);
            width: 240px;
        }
        .n-header .search-input::placeholder { color: #666; }
        
        /* 3. BBC-Inspired Nav */
        .n-nav {
            background: var(--newzyy-dark);
            padding: 0;
            border-bottom: 1px solid #222;
        }
        .n-nav .nav-link {
            color: #ccc !important;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 12px 16px !important;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }
        .n-nav .nav-link:hover,
        .n-nav .nav-link.active {
            color: #fff !important;
            border-bottom-color: var(--newzyy-red);
        }
        .n-nav .nav-link.dropdown-toggle::after { display: none; }
        
        /* 4. BBC-Inspired Trending Bar */
        .n-trending {
            background: var(--newzyy-red);
            color: #fff;
            padding: 6px 0;
            overflow: hidden;
            white-space: nowrap;
        }
        .n-trending .label {
            background: rgba(0,0,0,0.25);
            padding: 2px 14px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            display: inline-block;
            margin-right: 16px;
            border-radius: 2px;
        }
        .n-trending .track {
            display: inline-block;
            animation: scrollTicker 50s linear infinite;
        }
        .n-trending .track .item {
            display: inline-block;
            padding: 0 30px;
            font-size: 0.85rem;
        }
        .n-trending .track .item a { color: #fff; text-decoration: none; }
        .n-trending .track .item a:hover { text-decoration: underline; }
        
        @keyframes scrollTicker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        /* 5. BBC-Inspired Hero */
        .n-hero {
            background: var(--newzyy-card);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
            cursor: pointer;
            transition: 0.3s;
        }
        .n-hero:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .n-hero img { width: 100%; height: 340px; object-fit: cover; }
        .n-hero .content { padding: 24px 28px; background: var(--newzyy-card); }
        .n-hero .content .category {
            font-size: 0.7rem;
            color: var(--newzyy-red);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .n-hero .content .title {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 8px 0;
        }
        .n-hero .content .title a { color: var(--newzyy-text); text-decoration: none; }
        .n-hero .content .title a:hover { color: var(--newzyy-red); }
        .n-hero .content .meta {
            font-size: 0.8rem;
            color: var(--newzyy-muted);
        }
        
        /* 6. BBC-Inspired Card */
        .n-card {
            background: var(--newzyy-card);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--newzyy-border);
            margin-bottom: 16px;
        }
        .n-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
        .n-card .row { margin: 0; }
        .n-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .n-card .body { padding: 16px 20px; }
        .n-card .body .category {
            font-size: 0.65rem;
            color: var(--newzyy-red);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .n-card .body .title {
            font-size: 1.05rem;
            font-weight: 700;
            margin: 6px 0;
            line-height: 1.3;
        }
        .n-card .body .title a { color: var(--newzyy-text); text-decoration: none; }
        .n-card .body .title a:hover { color: var(--newzyy-red); }
        .n-card .body .excerpt {
            font-size: 0.9rem;
            color: var(--newzyy-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .n-card .body .meta {
            font-size: 0.75rem;
            color: var(--newzyy-muted);
            margin-top: 8px;
        }
        
        /* 7. BBC-Inspired Pagination */
        .n-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 30px 0;
            flex-wrap: wrap;
        }
        .n-pagination .btn-page {
            padding: 8px 16px;
            border: 1px solid var(--newzyy-border);
            background: var(--newzyy-card);
            color: var(--newzyy-text);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            min-width: 40px;
            text-align: center;
        }
        .n-pagination .btn-page:hover {
            background: var(--newzyy-red);
            color: #fff;
            border-color: var(--newzyy-red);
        }
        .n-pagination .btn-page.active {
            background: var(--newzyy-red);
            color: #fff;
            border-color: var(--newzyy-red);
        }
        .n-pagination .btn-page.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .n-pagination .btn-page.disabled:hover {
            background: var(--newzyy-card);
            color: var(--newzyy-text);
            border-color: var(--newzyy-border);
        }
        
        /* 8. BBC-Inspired Sidebar */
        .n-sidebar .widget {
            background: var(--newzyy-card);
            padding: 16px 20px;
            border-radius: 8px;
            border: 1px solid var(--newzyy-border);
            margin-bottom: 20px;
        }
        .n-sidebar .widget .widget-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--newzyy-text);
            border-bottom: 2px solid var(--newzyy-red);
            padding-bottom: 8px;
            margin-bottom: 14px;
        }
        .n-sidebar .widget .topic-tag {
            padding: 4px 14px;
            background: var(--newzyy-light);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--newzyy-text);
            cursor: pointer;
            border: 1px solid var(--newzyy-border);
            transition: 0.3s;
        }
        .n-sidebar .widget .topic-tag:hover {
            background: var(--newzyy-red);
            color: #fff;
            border-color: var(--newzyy-red);
        }
        
        /* 9. BBC-Inspired Footer */
        .n-footer {
            background: var(--newzyy-dark);
            color: #ccc;
            padding: 40px 0 20px;
            margin-top: 40px;
            border-top: 3px solid var(--newzyy-red);
        }
        .n-footer a { color: #ccc; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .n-footer a:hover { color: #fff; }
        .n-footer .links { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .n-footer .copyright { font-size: 0.75rem; color: #666; margin-top: 20px; text-align: center; }
        
        /* 10. Responsive */
        @media (max-width: 768px) {
            .n-header .logo { font-size: 1.4rem; }
            .n-header .search-input { width: 140px; }
            .n-header .search-input:focus { width: 160px; }
            .n-hero img { height: 200px; }
            .n-hero .content .title { font-size: 1.3rem; }
            .n-card img { height: 120px; }
            .n-nav .nav-link { font-size: 0.7rem; padding: 8px 10px !important; }
        }
        @media (max-width: 576px) {
            .n-header .search-input { width: 100px; }
            .n-hero img { height: 160px; }
            .n-hero .content { padding: 16px; }
            .n-hero .content .title { font-size: 1.1rem; }
            .n-card .body { padding: 12px 16px; }
            .n-card .body .title { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<!-- ===== TRENDING BAR ===== -->
<div class="n-trending">
    <span class="label">⚡ Breaking</span>
    <div class="track" id="tickerTrack">
        <span class="item">Loading news...</span>
    </div>
</div>

<!-- ===== HEADER ===== -->
<header class="n-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div class="logo">
                Newzy<span>y</span>
                <small>News</small>
            </div>
            <div class="d-flex align-items-center gap-3">
                <input type="text" id="searchInput" class="search-input" placeholder="Search...">

            </div>

</header>

<!-- ===== NAVBAR ===== -->
<nav class="n-nav">
    <div class="container">
        <div class="d-flex flex-wrap" id="navLinks">
            <a class="nav-link active" href="#" onclick="filterCategory('all')">Home</a>
            <a class="nav-link" href="#" onclick="filterCategory('politics')">Politics</a>

<!-- ===== MAIN CONTENT ===== -->
<main class="container py-4">

    <!-- ===== HERO ===== -->

    <!-- ===== NEWS GRID ===== -->
    <div class="row">

        </div>
        <div class="copyright">© 2026 Newzyy — Independent Journalism</div>
    </div>
</footer>

<!-- ===== SCRIPTS ===== -->
<script src="plugins/jquery/jquery.js"></script>
<script src="plugins/bootstrap/js/bootstrap.min.js"></script>
<script src="plugins/slick-carousel/slick.min.js"></script>
<script src="js/custom.js"></script>

<script>
// ============================================================
//  NEWZYY — BBC-INSPIRED COMPLETE SCRIPT
// ============================================================

// ===== BACKEND API =====
const API_BASE = 'https://newzyy.onrender.com';
let allNews = [];
let currentFilter = 'all';
let currentPage = 1;
const ITEMS_PER_PAGE = 6;
let totalPages = 1;

// ===== CATEGORIES =====
const CATEGORIES = ['politics', 'technology', 'sports', 'business', 'health', 'science', 'entertainment'];
const CATEGORY_COLORS = {
    politics: '#e8380d',
    technology: '#2563eb',
    sports: '#16a34a',
    business: '#7c3aed',
    health: '#0891b2',
    science: '#d97706',
    entertainment: '#dc2626'
};

// ===== LOGIN/LOGOUT =====
function updateNavbar() {
    const loggedIn = JSON.parse(localStorage.getItem('newzyy_logged_in') || 'null');
    const accountLink = document.getElementById('accountLink');
    const accountDropdown = document.getElementById('accountDropdown');

    if (loggedIn && accountLink) {
        accountLink.textContent = loggedIn.name + ' ▼';
        if (accountDropdown) {
            accountDropdown.innerHTML = `
                <a class="dropdown-item" href="#" onclick="logoutUser(); return false;" style="color:#ccc;">🚪 Logout</a>
            `;
        }
    } else if (!loggedIn && accountLink) {
        accountLink.textContent = 'Account ▼';
        if (accountDropdown) {
            accountDropdown.innerHTML = `
                <a class="dropdown-item" href="account.html" style="color:#ccc;">Log In</a>
                <a class="dropdown-item" href="signup.html" style="color:#ccc;">Register</a>
            `;
        }
    }
}

function logoutUser() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('newzyy_logged_in');
        location.reload();
    }
}

// ===== UTILITY =====
function getReadingTime(text) {
    const words = (text || '').split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 200));
}

// ===== FETCH NEWS =====
async function fetchNews() {
    try {
        const res = await fetch(`${API_BASE}/api/all-news`);
        const data = await res.json();
        if (data.success && data.news) {
            allNews = data.news;
            console.log('✅ Loaded ' + allNews.length + ' articles');
        } else {
            allNews = [];
        }
    } catch(e) {
        console.error('❌ Fetch error:', e);
        allNews = [];
    }
    currentPage = 1;
    renderAll();
    updateTicker();
    renderHero();
    renderTrending();
}

// ===== RENDER ALL NEWS =====
function renderAll() {
    let f = currentFilter === 'all' ? allNews : allNews.filter(n => n.category === currentFilter);
    totalPages = Math.max(1, Math.ceil(f.length / ITEMS_PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageItems = f.slice(start, start + ITEMS_PER_PAGE);
    
    const container = document.getElementById('newsContainer');
    if (!container) return;
    
    if (!pageItems.length) {
        container.innerHTML = `
            <div class="text-center py-5">
                <h3 style="color:var(--newzyy-red);">📭 No News Found</h3>
                <p class="text-muted">Try checking back later.</p>
                <button onclick="filterCategory('all')" class="btn btn-danger">Show All</button>
            </div>
        `;
        document.getElementById('paginationContainer').style.display = 'none';
        return;
    }
    
    let html = '';
    pageItems.forEach(a => {
        html += `
            <div class="n-card" onclick="openNews('${a.id}')">
                <div class="row g-0">
                    <div class="col-md-4">
                        <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=400'" loading="lazy">
                    </div>
                    <div class="col-md-8">
                        <div class="body">
                            <span class="category" style="color:${CATEGORY_COLORS[a.category] || '#e8380d'}">${a.category || 'News'}</span>
                            <h4 class="title"><a href="single-post.html?id=${a.id}">${a.title}</a></h4>
                            <p class="excerpt">${(a.excerpt || a.description || '').substring(0, 120)}...</p>
                            <div class="meta">${a.author || 'Newzyy'} · ${a.time || 'Just now'} · ${getReadingTime(a.body || a.excerpt)} min</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
    updatePagination(totalPages);
}

// ===== PAGINATION =====
function updatePagination(total) {
    const container = document.getElementById('paginationContainer');
    if (!container) return;
    if (total <= 1) { container.style.display = 'none'; return; }
    container.style.display = 'flex';
    
    document.getElementById('prevPage').classList.toggle('disabled', currentPage <= 1);
    document.getElementById('nextPage').classList.toggle('disabled', currentPage >= total);
    
    let pages = '';
    const maxVisible = 5;
    let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let end = Math.min(total, start + maxVisible - 1);
    if (end - start < maxVisible - 1) start = Math.max(1, end - maxVisible + 1);
    
    if (start > 1) { pages += `<button class="btn-page" onclick="goToPage(1)">1</button>`; if (start > 2) pages += `<span class="btn-page disabled">…</span>`; }
    for (let i = start; i <= end; i++) pages += `<button class="btn-page ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    if (end < total) { if (end < total - 1) pages += `<span class="btn-page disabled">…</span>`; pages += `<button class="btn-page" onclick="goToPage(${total})">${total}</button>`; }
    
    document.getElementById('pageNumbers').innerHTML = pages;
}

function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderAll();
    window.scrollTo({ top: document.querySelector('.n-card')?.offsetTop - 80 || 0, behavior: 'smooth' });
}

// ===== FILTER =====
function filterCategory(cat) {
    currentFilter = cat;
    currentPage = 1;
    document.querySelectorAll('.n-nav .nav-link').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.n-nav .nav-link').forEach(el => {
        const text = el.textContent.toLowerCase().trim();
        if (text === cat || (cat === 'all' && text === 'home')) el.classList.add('active');
    });
    renderAll();
}

// ===== HERO =====
function renderHero() {
    const container = document.getElementById('heroCarousel');
    if (!container || !allNews.length) { container.innerHTML = ''; return; }
    const top = allNews[0];
    container.innerHTML = `
        <div class="n-hero" onclick="openNews('${top.id}')">
            <img src="${top.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=800'" loading="lazy">
            <div class="content">
                <span class="category">${top.category || 'News'}</span>
                <h2 class="title"><a href="single-post.html?id=${top.id}">${top.title}</a></h2>
                <div class="meta">${top.author || 'Newzyy'} · ${top.time || 'Just now'} · ${getReadingTime(top.body || top.excerpt)} min read</div>
            </div>
        </div>
    `;
}

// ===== TRENDING TICKER =====
function updateTicker() {
    const container = document.getElementById('tickerTrack');
    if (!container) return;
    const items = allNews.slice(0, 12);
    if (!items.length) { container.innerHTML = '<span class="item">Welcome to Newzyy</span>'; return; }
    const doubled = [...items, ...items];
    container.innerHTML = doubled.map(a => `<span class="item"><a href="single-post.html?id=${a.id}">${a.title}</a></span>`).join('');
}

// ===== TRENDING TOPICS =====
function renderTrending() {
    const container = document.getElementById('trendingTopics');
    if (!container) return;
    const topics = ['Politics', 'Technology', 'Sports', 'Business', 'Health', 'Science', 'Entertainment', 'AI', 'Climate', 'Economy'];
    const shuffled = topics.sort(() => 0.5 - Math.random()).slice(0, 8);
    container.innerHTML = shuffled.map(t => `
        <span class="topic-tag" onclick="filterCategory('${t.toLowerCase()}')">#${t}</span>
    `).join('');
}

// ===== SEARCH =====
document.getElementById('searchInput')?.addEventListener('input', function(e) {
    const q = e.target.value.toLowerCase().trim();
    if (q.length < 2) { filterCategory('all'); return; }
    const results = allNews.filter(a => a.title.toLowerCase().includes(q) || (a.category && a.category.toLowerCase().includes(q)));
    const container = document.getElementById('newsContainer');
    if (!results.length) { container.innerHTML = '<div class="text-center py-5"><h4>🔍 No results found</h4></div>'; return; }
    let html = `<h4 class="mb-3">🔍 Results (${results.length})</h4>`;
    results.slice(0, 12).forEach(a => {
        html += `
            <div class="n-card" onclick="openNews('${a.id}')">
                <div class="row g-0">
                    <div class="col-md-4"><img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=400'" loading="lazy"></div>
                    <div class="col-md-8">
                        <div class="body">
                            <span class="category" style="color:${CATEGORY_COLORS[a.category] || '#e8380d'}">${a.category || 'News'}</span>
                            <h4 class="title"><a href="single-post.html?id=${a.id}">${a.title}</a></h4>
                            <div class="meta">${a.author || 'Newzyy'} · ${a.time || 'Just now'}</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    container.innerHTML = html;
    document.getElementById('paginationContainer').style.display = 'none';
});

// ===== OPEN NEWS =====
function openNews(id) { window.location.href = 'single-post.html?id=' + id; }

// ===== THEME TOGGLE =====
function toggleTheme() {
    document.body.classList.toggle('dark-theme');
    localStorage.setItem('newzyy_theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
}
if (localStorage.getItem('newzyy_theme') === 'dark') document.body.classList.add('dark-theme');

    body.dark-theme .n-card .body .title a { color: #ffffff; }
    body.dark-theme .n-card .body .title a:hover { color: #e8380d; }
    body.dark-theme .n-sidebar .widget { background: #151515; border-color: #222; }
    body.dark-theme .n-hero { background: #151515; }

    body.dark-theme .n-hero .content .title a { color: #ffffff; }
    body.dark-theme .n-hero .content .title a:hover { color: #e8380d; }
    body.dark-theme .n-pagination .btn-page { background: #151515; border-color: #333; color: #fff; }

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
    updateNavbar();
    fetchNews();
});

// Make global
window.filterCategory = filterCategory;
window.openNews = openNews;
window.goToPage = goToPage;
window.logoutUser = logoutUser;
window.toggleTheme = toggleTheme;
</script>
