<html lang="en">
 
<head>
    <meta charset="utf-8">
    <title>Newzyy — Top World News</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-name" content="Newzyy" />
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
 
    <!-- THEME CSS -->
    <link rel="stylesheet" href="plugins/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="plugins/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="plugins/slick-carousel/slick.css">
    <link rel="stylesheet" href="plugins/slick-carousel/slick-theme.css">
    <link rel="stylesheet" href="css/style.css?v=2">
 
    <!-- BBC-Inspired Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
 
    <style>
        /* ===== Same BBC design tokens as index.html — keep in sync ===== */
        :root {
            --bbc-red: #b80000;
            --bbc-dark: #0a0a0a;
            --bbc-light: #f5f5f0;
            --bbc-card: #ffffff;
            --bbc-border: #e8e4df;
            --bbc-text: #0a0a0a;
            --bbc-muted: #6a6a6a;
            --bbc-font: 'Inter', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--bbc-font);
            background: var(--bbc-light);
            color: var(--bbc-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }
 
        /* ===== TRENDING BAR ===== */
        .bbc-trending { background: var(--bbc-dark); color: #fff; padding: 8px 0; border-bottom: 2px solid var(--bbc-red); font-size: 0.85rem; }
        .bbc-trending .label { background: var(--bbc-red); padding: 2px 16px; font-weight: 600; font-size: 0.65rem; text-transform: uppercase; display: inline-block; margin-right: 16px; letter-spacing: 0.5px; }
        .bbc-trending .track { display: inline-block; overflow: hidden; white-space: nowrap; vertical-align: middle; max-width: 80%; }
        .bbc-trending .track .item { display: inline-block; padding: 0 24px; font-size: 0.8rem; }
        .bbc-trending .track .item a { color: #fff; }
        .bbc-trending .track .item a:hover { text-decoration: underline; }
 
        /* ===== HEADER ===== */
        .bbc-header { background: #ffffff; border-bottom: 1px solid var(--bbc-border); padding: 16px 0; position: sticky; top: 0; z-index: 100; }
        .bbc-header .logo { font-family: var(--bbc-font); font-size: 1.8rem; font-weight: 900; color: var(--bbc-dark); letter-spacing: -0.5px; }
        .bbc-header .logo span { color: var(--bbc-red); }
        .bbc-header .logo small { font-size: 0.55rem; font-weight: 400; color: #888; letter-spacing: 0.5px; text-transform: uppercase; }
        .bbc-header .search-input { background: var(--bbc-light); border: 1px solid var(--bbc-border); border-radius: 4px; padding: 8px 16px 8px 36px; font-size: 0.85rem; width: 220px; outline: none; font-family: var(--bbc-font); transition: 0.3s; }
        .bbc-header .search-input:focus { border-color: var(--bbc-red); box-shadow: 0 0 0 3px rgba(184,0,0,0.08); width: 260px; }
        .bbc-header .search-wrapper { position: relative; }
        .bbc-header .search-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999; font-size: 0.85rem; }
        .bbc-header .account-section { display: flex; align-items: center; gap: 12px; }
        .bbc-header .account-section .btn-login { background: transparent; border: 1px solid var(--bbc-border); color: var(--bbc-dark); padding: 6px 20px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: var(--bbc-font); }
        .bbc-header .account-section .btn-login:hover { background: var(--bbc-light); }
        .bbc-header .account-section .btn-signup { background: var(--bbc-red); border: 1px solid var(--bbc-red); color: #fff; padding: 6px 20px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: var(--bbc-font); }
        .bbc-header .account-section .btn-signup:hover { background: #a00000; border-color: #a00000; }
        .bbc-header .account-section .user-profile { display: flex; align-items: center; gap: 10px; }
        .bbc-header .account-section .user-profile .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bbc-red); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
        .bbc-header .account-section .user-profile .username { font-weight: 600; font-size: 0.85rem; color: var(--bbc-dark); }
        .bbc-header .account-section .user-profile .btn-logout { background: transparent; border: 1px solid var(--bbc-border); color: #666; padding: 3px 14px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-family: var(--bbc-font); }
        .bbc-header .account-section .user-profile .btn-logout:hover { background: var(--bbc-light); }
 
        /* ===== NAVBAR ===== */
        .bbc-nav { background: #ffffff; border-bottom: 1px solid var(--bbc-border); padding: 0; }
        .bbc-nav .nav-link { color: #4a4a4a !important; font-size: 0.75rem; font-weight: 600; padding: 12px 16px !important; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 2px solid transparent; transition: 0.3s; cursor: pointer; font-family: var(--bbc-font); }
        .bbc-nav .nav-link:hover, .bbc-nav .nav-link.active { color: var(--bbc-red) !important; border-bottom-color: var(--bbc-red); }
 
        /* ===== ARTICLE PAGE ===== */
        .bbc-article-wrap { margin: 28px 0 40px; }
        .bbc-breadcrumb { font-size: 0.75rem; color: var(--bbc-muted); margin-bottom: 16px; }
        .bbc-breadcrumb a:hover { color: var(--bbc-red); }
 
        .bbc-article-header .category-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .bbc-article-header .category-badge { background: var(--bbc-red); color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 12px; display: inline-block; }
        .bbc-live-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bbc-dark); color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 12px 4px 10px; }
        .bbc-live-badge .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bbc-red); display: inline-block; }
 
        .bbc-article-header .article-title { font-family: var(--bbc-font); font-size: 2.1rem; font-weight: 800; line-height: 1.2; color: var(--bbc-dark); margin-bottom: 14px; }
        .bbc-article-header .article-excerpt { font-size: 1.1rem; color: var(--bbc-muted); font-weight: 400; margin-bottom: 18px; line-height: 1.5; }
 
        .bbc-article-meta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; padding: 14px 0; border-top: 1px solid var(--bbc-border); border-bottom: 1px solid var(--bbc-border); font-size: 0.85rem; color: var(--bbc-muted); margin-bottom: 24px; }
        .bbc-article-meta .read-time { background: var(--bbc-light); padding: 2px 10px; font-size: 0.75rem; font-weight: 600; }
        .bbc-article-meta .view-count { display: flex; align-items: center; gap: 4px; }
 
        .bbc-article-image { margin-bottom: 24px; overflow: hidden; }
        .bbc-article-image img { width: 100%; max-height: 480px; object-fit: cover; display: block; }
        .bbc-article-image .caption { font-size: 0.75rem; color: var(--bbc-muted); padding: 8px 0; border-bottom: 1px solid var(--bbc-border); }
 
        .bbc-article-body { font-size: 1.05rem; line-height: 1.8; color: #1a1a1a; }
        .bbc-article-body p { margin-bottom: 20px; }
        .bbc-article-body p:first-of-type::first-letter {
            font-size: 3.2rem; font-weight: 800; float: left; line-height: 1; padding: 4px 8px 0 0; color: var(--bbc-red); font-family: var(--bbc-font);
        }
 
        .bbc-source-line { margin: 24px 0; padding: 14px 18px; background: var(--bbc-card); border: 1px solid var(--bbc-border); border-left: 4px solid var(--bbc-red); font-size: 0.85rem; color: var(--bbc-muted); }
        .bbc-source-line a { color: var(--bbc-red); font-weight: 600; }
        .bbc-source-line a:hover { text-decoration: underline; }
 
        .bbc-share-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-top: 1px solid var(--bbc-border); border-bottom: 1px solid var(--bbc-border); margin: 24px 0 40px; flex-wrap: wrap; gap: 12px; }
        .bbc-share-row .tags span { font-size: 0.75rem; color: var(--bbc-muted); text-transform: uppercase; font-weight: 700; margin-right: 8px; }
        .bbc-share-row .tags a { font-size: 0.75rem; background: var(--bbc-light); border: 1px solid var(--bbc-border); padding: 4px 12px; margin-right: 6px; display: inline-block; color: var(--bbc-text); }
        .bbc-share-row .tags a:hover { background: var(--bbc-red); color: #fff; border-color: var(--bbc-red); }
        .bbc-share-row .share-icons { display: flex; gap: 8px; list-style: none; }
        .bbc-share-row .share-icons a { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: var(--bbc-light); border: 1px solid var(--bbc-border); color: var(--bbc-dark); }
        .bbc-share-row .share-icons a:hover { background: var(--bbc-red); color: #fff; border-color: var(--bbc-red); }
 
        /* ===== RELATED STORIES ===== */
        .bbc-related { margin: 20px 0 40px; }
        .bbc-related .section-title { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; color: var(--bbc-dark); border-bottom: 2px solid var(--bbc-red); padding-bottom: 10px; margin-bottom: 20px; }
        .bbc-related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .bbc-related-card { background: var(--bbc-card); border: 1px solid var(--bbc-border); cursor: pointer; transition: 0.3s; }
        .bbc-related-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .bbc-related-card img { width: 100%; height: 130px; object-fit: cover; }
        .bbc-related-card .body { padding: 12px 14px; }
        .bbc-related-card .category { font-size: 0.6rem; color: var(--bbc-red); text-transform: uppercase; font-weight: 700; }
        .bbc-related-card .title { font-size: 0.85rem; font-weight: 700; line-height: 1.3; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .bbc-related-card .title:hover { color: var(--bbc-red); }
        .bbc-related-card .meta { font-size: 0.65rem; color: var(--bbc-muted); margin-top: 8px; }
 
        /* ===== SIDEBAR (kept from your original widgets) ===== */
        .bbc-sidebar .widget { background: var(--bbc-card); padding: 16px 20px; border: 1px solid var(--bbc-border); margin-bottom: 20px; }
        .bbc-sidebar .widget .widget-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--bbc-dark); border-bottom: 2px solid var(--bbc-red); padding-bottom: 8px; margin-bottom: 14px; letter-spacing: 0.3px; }
 
        /* ===== FOOTER ===== */
        .bbc-footer { background: var(--bbc-dark); color: #ccc; padding: 40px 0 20px; margin-top: 40px; border-top: 3px solid var(--bbc-red); }
        .bbc-footer a { color: #ccc; font-size: 0.85rem; }
        .bbc-footer a:hover { color: #fff; }
        .bbc-footer .links { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; }
        .bbc-footer .copyright { font-size: 0.75rem; color: #666; margin-top: 20px; text-align: center; }
 
        /* ===== STATE MESSAGES ===== */
        .bbc-state-msg { text-align: center; padding: 80px 20px; }
        .bbc-state-msg h4 { font-weight: 700; margin-bottom: 10px; }
        .bbc-state-msg a { color: var(--bbc-red); font-weight: 700; }
 
        @media (max-width: 992px) {
            .bbc-related-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .bbc-article-header .article-title { font-size: 1.5rem; }
            .bbc-share-row { flex-direction: column; align-items: flex-start; }
            .bbc-related-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<script>
// ============================================================
//  NEWZYY — SINGLE POST (BBC-style, dynamic)
// ============================================================
const API_BASE = 'https://newzyy.onrender.com';
let allNews = [];
let articleViews = JSON.parse(localStorage.getItem('articleViews') || '{}');
 
const CATEGORY_COLORS = {
    politics: '#b80000', technology: '#2563eb', sports: '#16a34a', business: '#7c3aed',
    health: '#0891b2', science: '#d97706', entertainment: '#dc2626', travel: '#0ea5e9',
    environment: '#22c55e', culture: '#8b5cf6', world: '#3b82f6', economy: '#f59e0e'
};
const CATEGORY_NAMES = {
    politics: 'Politics', technology: 'Technology', sports: 'Sports', business: 'Business',
    health: 'Health', science: 'Science', entertainment: 'Entertainment', travel: 'Travel',
    environment: 'Earth', culture: 'Culture', world: 'World', economy: 'Economy'
};
 
// ===== SHARED UTILITIES (kept identical to index.html) =====
function getReadingTime(text) {
    const words = (text || '').split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 200));
}
function trackView(id) {
    articleViews[id] = (articleViews[id] || 0) + 1;
    localStorage.setItem('articleViews', JSON.stringify(articleViews));
}
function getViews(id) { return articleViews[id] || 0; }
 
function updateAccountLinks() {
    const loggedIn = JSON.parse(localStorage.getItem('newzyy_logged_in') || 'null');
    const container = document.getElementById('accountLinks');
    if (!container) return;
    if (loggedIn) {
        const initials = loggedIn.name.charAt(0).toUpperCase();
        container.innerHTML = `
            <div class="user-profile">
                <div class="avatar">${initials}</div>
                <span class="username">${loggedIn.name}</span>
                <button class="btn-logout" onclick="logoutUser()">Logout</button>
            </div>`;
    } else {
        container.innerHTML = `
            <a href="account.html" class="btn-login">Log In</a>
            <a href="signup.html" class="btn-signup">Register</a>`;
    }
}
function logoutUser() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('newzyy_logged_in');
        location.reload();
    }
}
 
// ===== BODY -> PARAGRAPHS =====
// API bodies come back as a single text blob. Split on blank lines first,
// fall back to sentence grouping so long single-blob bodies aren't one wall of text.
function renderBody(bodyText) {
    if (!bodyText) return '<p>Full article text is not available for this story yet.</p>';
    let paras = bodyText.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
    if (paras.length <= 1) {
        const sentences = bodyText.match(/[^.!?]+[.!?]+/g) || [bodyText];
        paras = [];
        let chunk = '';
        sentences.forEach((s, i) => {
            chunk += s.trim() + ' ';
            if ((i + 1) % 4 === 0) { paras.push(chunk.trim()); chunk = ''; }
        });
        if (chunk.trim()) paras.push(chunk.trim());
    }
    return paras.map(p => `<p>${escapeHtml(p)}</p>`).join('');
}
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}
 
// ===== TRENDING BAR (same source as index.html) =====
function updateTrendingBar() {
    const container = document.getElementById('trendingTrack');
    if (!container) return;
    const items = allNews.slice(0, 12);
    if (!items.length) {
        container.innerHTML = '<span class="item">Welcome to Newzyy</span>';
        return;
    }
    container.innerHTML = items.map(a => `
        <span class="item"><a href="single-post.html?id=${a.id}">${a.title}</a></span>
    `).join('');
}
 
// ===== RELATED STORIES =====
function renderRelated(article) {
    const related = allNews
        .filter(a => a.category === article.category && a.id !== article.id)
        .slice(0, 4);
 
    if (!related.length) return '';
 
    return `
        <div class="bbc-related">
            <h3 class="section-title">Related Stories</h3>
            <div class="bbc-related-grid">
                ${related.map(a => `
                    <div class="bbc-related-card" onclick="window.location.href='single-post.html?id=${a.id}'">
                        <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=400'" loading="lazy">
                        <div class="body">
                            <span class="category" style="color:${CATEGORY_COLORS[a.category] || '#b80000'}">${CATEGORY_NAMES[a.category] || a.category || 'News'}</span>
                            <div class="title">${a.title}</div>
                            <div class="meta">${a.time || 'Just now'} · <i class="fa fa-eye"></i> ${getViews(a.id)}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}
 
// ===== LIVE / BREAKING BADGE =====
// Reads article.breaking if the backend sends it. Safe no-op otherwise.
function renderLiveBadge(article) {
    if (!article.breaking) return '';
    return `<span class="bbc-live-badge"><span class="live-dot"></span> Live</span>`;
}
 
// ===== RENDER ARTICLE =====
function renderArticle(article) {
    trackView(article.id);
    const catName = CATEGORY_NAMES[article.category] || (article.category || 'News');
    const catColor = CATEGORY_COLORS[article.category] || '#b80000';
 
    document.title = `${article.title} — Newzyy`;
 
    document.getElementById('articleRoot').innerHTML = `
        <div class="row">
            <div class="col-lg-8 col-md-12">
                <div class="bbc-breadcrumb">
                    <a href="index.html">Home</a> ›
                    <a href="index.html?cat=${article.category}">${catName}</a> › Article
                </div>
 
                <div class="bbc-article-header">
                    <div class="category-row">
                        <a class="category-badge" href="index.html?cat=${article.category}" style="background:${catColor}">${catName}</a>
                        ${renderLiveBadge(article)}
                    </div>
                    <h1 class="article-title">${article.title}</h1>
                    ${article.excerpt ? `<p class="article-excerpt">${article.excerpt}</p>` : ''}
                </div>
 
                <div class="bbc-article-meta">
                    <span>By <strong>${article.author || 'Newzyy'}</strong></span>
                    <span>${article.time || 'Just now'}</span>
                    <span class="read-time">${getReadingTime(article.body || article.excerpt)} min read</span>
                    <span class="view-count"><i class="fa fa-eye"></i> ${getViews(article.id)} views</span>
                </div>
 
                <div class="bbc-article-image">
                    <img src="${article.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=1000'" alt="${article.title}">
                </div>
 
                <div class="bbc-article-body">
                    ${renderBody(article.body || article.excerpt)}
                </div>
 
                ${article.source_url ? `
                    <div class="bbc-source-line">
                        Originally reported by <strong>${article.source || 'the source'}</strong>.
                        <a href="${article.source_url}" target="_blank" rel="noopener noreferrer">Read the full original article →</a>
                    </div>
                ` : ''}
 
                <div class="bbc-share-row">
                    <div class="tags">
                        <span>Tags</span>
                        <a href="index.html?cat=${article.category}">${catName}</a>
                    </div>
                    <ul class="share-icons list-unstyled">
                        <li><a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}" target="_blank" rel="noopener"><i class="fa fa-facebook"></i></a></li>
                        <li><a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(article.title)}" target="_blank" rel="noopener"><i class="fa fa-twitter"></i></a></li>
                        <li><a href="https://api.whatsapp.com/send?text=${encodeURIComponent(article.title + ' ' + location.href)}" target="_blank" rel="noopener"><i class="fa fa-whatsapp"></i></a></li>
                    </ul>
                </div>
 
                ${renderRelated(article)}
            </div>
 
            <div class="col-lg-4 col-md-12 bbc-sidebar">
                <div class="widget">
                    <h4 class="widget-title">More in ${catName}</h4>
                    <div id="sidebarCategoryList"></div>
                </div>
            </div>
        </div>
    `;
 
    renderSidebarCategoryList(article);
}
 
function renderSidebarCategoryList(article) {
    const container = document.getElementById('sidebarCategoryList');
    if (!container) return;
    const items = allNews.filter(a => a.category === article.category && a.id !== article.id).slice(0, 5);
    if (!items.length) { container.innerHTML = '<p class="text-muted small">No other stories yet.</p>'; return; }
    container.innerHTML = items.map(a => `
        <div style="padding:10px 0;border-bottom:1px solid var(--bbc-border);cursor:pointer" onclick="window.location.href='single-post.html?id=${a.id}'">
            <div style="font-size:0.85rem;font-weight:600;line-height:1.3">${a.title}</div>
            <div style="font-size:0.7rem;color:var(--bbc-muted);margin-top:4px">${a.time || 'Just now'}</div>
        </div>
    `).join('');
}
 
function renderNotFound() {
    document.getElementById('articleRoot').innerHTML = `
        <div class="bbc-state-msg">
            <h4>Article not found</h4>
            <p class="text-muted">This story may have been removed or the link is incorrect.</p>
            <a href="index.html">← Back to Newzyy home</a>
        </div>
    `;
}
 
// ===== INIT =====
async function init() {
    updateAccountLinks();
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { renderNotFound(); return; }
 
    try {
        const res = await fetch(`${API_BASE}/api/all-news`);
        const data = await res.json();
        allNews = (data && data.success && data.news) ? data.news : [];
    } catch (e) {
        console.error('Fetch error:', e);
        allNews = [];
    }
 
    updateTrendingBar();
 
    const article = allNews.find(a => a.id === id);
    if (!article) { renderNotFound(); return; }
    renderArticle(article);
}
 
document.addEventListener('DOMContentLoaded', init);
window.logoutUser = logoutUser;
</script>
