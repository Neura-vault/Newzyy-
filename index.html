    <!-- THEME CSS -->

    <link rel="stylesheet" href="plugins/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="plugins/slick-carousel/slick.css">

    <!-- BBC-Inspired Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ===== BBC-INSPIRED DESIGN (Clean, No Emojis) ===== */
        :root {
            --bbc-red: #b80000;
            --bbc-dark: #0a0a0a;
            --bbc-light: #f5f5f0;
            --bbc-card: #ffffff;
            --bbc-border: #e8e4df;
            --bbc-text: #0a0a0a;
            --bbc-muted: #6a6a6a;
            --bbc-font: 'Inter', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--bbc-font); 
            background: var(--bbc-light); 
            color: var(--bbc-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }
        
        /* ===== TRENDING BAR ===== */
        .bbc-trending {
            background: var(--bbc-dark);
            color: #fff;
            padding: 8px 0;
            border-bottom: 2px solid var(--bbc-red);
            font-size: 0.85rem;
        }
        .bbc-trending .label {
            background: var(--bbc-red);
            padding: 2px 16px;
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            display: inline-block;
            margin-right: 16px;
            border-radius: 0;
            letter-spacing: 0.5px;
        }
        .bbc-trending .track {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            vertical-align: middle;
            max-width: 80%;
        }
        .bbc-trending .track .item {
            display: inline-block;
            padding: 0 24px;
            font-size: 0.8rem;
        }
        .bbc-trending .track .item a { color: #fff; }
        .bbc-trending .track .item a:hover { text-decoration: underline; }
        
        /* ===== HEADER (Clean, No Emojis) ===== */
        .bbc-header {
            background: #ffffff;
            border-bottom: 1px solid var(--bbc-border);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .bbc-header .logo {
            font-family: var(--bbc-font);
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--bbc-dark);
            letter-spacing: -0.5px;
        }
        .bbc-header .logo span { color: var(--bbc-red); }
        .bbc-header .logo small { 
            font-size: 0.55rem; 
            font-weight: 400; 
            color: #888;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .bbc-header .search-input {
            background: var(--bbc-light);
            border: 1px solid var(--bbc-border);
            border-radius: 4px;
            padding: 8px 16px 8px 36px;
            font-size: 0.85rem;
            width: 220px;
            outline: none;
            font-family: var(--bbc-font);
            transition: 0.3s;
        }
        .bbc-header .search-input:focus {
            border-color: var(--bbc-red);
            box-shadow: 0 0 0 3px rgba(184,0,0,0.08);
            width: 260px;
        }
        .bbc-header .search-wrapper { position: relative; }
        .bbc-header .search-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 0.85rem;
        }
        
        .bbc-header .account-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bbc-header .account-section .btn-login {
            background: transparent;
            border: 1px solid var(--bbc-border);
            color: var(--bbc-dark);
            padding: 6px 20px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
            cursor: pointer;
            font-family: var(--bbc-font);
        }
        .bbc-header .account-section .btn-login:hover {
            background: var(--bbc-light);
        }
        .bbc-header .account-section .btn-signup {
            background: var(--bbc-red);
            border: 1px solid var(--bbc-red);
            color: #fff;
            padding: 6px 20px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
            cursor: pointer;
            font-family: var(--bbc-font);
        }
        .bbc-header .account-section .btn-signup:hover {
            background: #a00000;
            border-color: #a00000;
        }
        .bbc-header .account-section .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bbc-header .account-section .user-profile .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bbc-red);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .bbc-header .account-section .user-profile .username {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--bbc-dark);
        }
        .bbc-header .account-section .user-profile .btn-logout {
            background: transparent;
            border: 1px solid var(--bbc-border);
            color: #666;
            padding: 3px 14px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: var(--bbc-font);
        }
        .bbc-header .account-section .user-profile .btn-logout:hover {
            background: var(--bbc-light);
        }
        
        /* ===== NAVBAR (BBC Style) ===== */
        .bbc-nav {
            background: #ffffff;
            border-bottom: 1px solid var(--bbc-border);
            padding: 0;
        }
        .bbc-nav .nav-link {
            color: #4a4a4a !important;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 12px 16px !important;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
            cursor: pointer;
            font-family: var(--bbc-font);
        }
        .bbc-nav .nav-link:hover,
        .bbc-nav .nav-link.active {
            color: var(--bbc-red) !important;
            border-bottom-color: var(--bbc-red);
        }
        
        /* ===== HERO SECTION (BBC Style) ===== */
        .bbc-hero {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin: 24px 0;
        }
        .bbc-hero .featured {
            background: var(--bbc-card);
            border-radius: 0;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--bbc-border);
        }
        .bbc-hero .featured:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }
        .bbc-hero .featured img {
            width: 100%;
            height: 340px;
            object-fit: cover;
        }
        .bbc-hero .featured .content {
            padding: 20px 24px;
        }
        .bbc-hero .featured .content .category {
            font-size: 0.7rem;
            color: var(--bbc-red);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .bbc-hero .featured .content .title {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 6px 0;
            line-height: 1.2;
            color: var(--bbc-dark);
            font-family: var(--bbc-font);
        }
        .bbc-hero .featured .content .title:hover { color: var(--bbc-red); }
        .bbc-hero .featured .content .meta {
            font-size: 0.8rem;
            color: var(--bbc-muted);
        }
        .bbc-hero .featured .content .views {
            font-size: 0.7rem;
            color: var(--bbc-muted);
            display: inline-block;
            margin-left: 12px;
        }
        
        .bbc-hero .side-stories {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .bbc-hero .side-stories .side-item {
            background: var(--bbc-card);
            border-radius: 0;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--bbc-border);
            display: flex;
            gap: 12px;
            padding: 12px;
            align-items: flex-start;
        }
        .bbc-hero .side-stories .side-item:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
        }
        .bbc-hero .side-stories .side-item img {
            width: 110px;
            height: 75px;
            object-fit: cover;
            border-radius: 0;
            flex-shrink: 0;
        }
        .bbc-hero .side-stories .side-item .side-content {
            flex: 1;
        }
        .bbc-hero .side-stories .side-item .side-content .side-category {
            font-size: 0.6rem;
            color: var(--bbc-red);
            text-transform: uppercase;
            font-weight: 700;
        }
        .bbc-hero .side-stories .side-item .side-content .side-title {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-family: var(--bbc-font);
        }
        .bbc-hero .side-stories .side-item .side-content .side-meta {
            font-size: 0.65rem;
            color: var(--bbc-muted);
            margin-top: 4px;
        }
        
        /* ===== CATEGORY HERO (BBC Style) ===== */
        .bbc-category-hero {
            background: var(--bbc-card);
            border-radius: 0;
            padding: 16px 24px;
            border-left: 4px solid var(--bbc-red);
            margin: 16px 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .bbc-category-hero .cat-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--bbc-dark);
            font-family: var(--bbc-font);
        }
        .bbc-category-hero .cat-title span { color: var(--bbc-red); }
        .bbc-category-hero .cat-count {
            font-size: 0.8rem;
            color: var(--bbc-muted);
        }
        
        /* ===== NEWS GRID ===== */
        .bbc-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin: 24px 0;
        }
        .bbc-card {
            background: var(--bbc-card);
            border-radius: 0;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--bbc-border);
        }
        .bbc-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }
        .bbc-card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }
        .bbc-card .body {
            padding: 16px 18px;
        }
        .bbc-card .body .category {
            font-size: 0.65rem;
            color: var(--bbc-red);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .bbc-card .body .title {
            font-size: 1rem;
            font-weight: 700;
            margin: 6px 0;
            line-height: 1.3;
            color: var(--bbc-dark);
            font-family: var(--bbc-font);
        }
        .bbc-card .body .title:hover { color: var(--bbc-red); }
        .bbc-card .body .excerpt {
            font-size: 0.85rem;
            color: var(--bbc-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-family: var(--bbc-font);
        }
        .bbc-card .body .meta {
            font-size: 0.7rem;
            color: var(--bbc-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .bbc-card .body .meta .read-time {
            background: var(--bbc-light);
            padding: 1px 10px;
            border-radius: 2px;
            font-size: 0.6rem;
            font-weight: 600;
        }
        .bbc-card .body .meta .view-count {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.65rem;
        }
        
        /* ===== LOAD MORE ===== */
        .bbc-load-more {
            text-align: center;
            margin: 32px 0;
        }
        .bbc-load-more button {
            padding: 12px 40px;
            background: transparent;
            border: 2px solid var(--bbc-red);
            color: var(--bbc-red);
            border-radius: 0;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: var(--bbc-font);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .bbc-load-more button:hover {
            background: var(--bbc-red);
            color: #fff;
        }
        
        /* ===== SIDEBAR ===== */
        .bbc-sidebar .widget {
            background: var(--bbc-card);
            border-radius: 0;
            padding: 16px 20px;
            border: 1px solid var(--bbc-border);
            margin-bottom: 20px;
        }
        .bbc-sidebar .widget .widget-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--bbc-dark);
            border-bottom: 2px solid var(--bbc-red);
            padding-bottom: 8px;
            margin-bottom: 14px;
            font-family: var(--bbc-font);
            letter-spacing: 0.3px;
        }
        .bbc-sidebar .widget .topic-tag {
            padding: 4px 14px;
            background: var(--bbc-light);
            border-radius: 0;
            font-size: 0.75rem;
            color: var(--bbc-text);
            cursor: pointer;
            border: 1px solid var(--bbc-border);
            transition: 0.3s;
            display: inline-block;
            margin: 3px;
            font-family: var(--bbc-font);
        }
        .bbc-sidebar .widget .topic-tag:hover {
            background: var(--bbc-red);
            color: #fff;
            border-color: var(--bbc-red);
        }
        
        /* ===== FOOTER (BBC Style) ===== */
        .bbc-footer {
            background: var(--bbc-dark);
            color: #ccc;
            padding: 40px 0 20px;
            margin-top: 40px;
            border-top: 3px solid var(--bbc-red);
        }
        .bbc-footer a { 
            color: #ccc; 
            font-size: 0.85rem; 
            transition: 0.3s; 
            font-family: var(--bbc-font);
        }
        .bbc-footer a:hover { color: #fff; }
        .bbc-footer .links { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; }
        .bbc-footer .copyright { 
            font-size: 0.75rem; 
            color: #666; 
            margin-top: 20px; 
            text-align: center; 
            font-family: var(--bbc-font);
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .bbc-hero { grid-template-columns: 1fr; }
            .bbc-hero .featured img { height: 240px; }
            .bbc-hero .side-stories { display: grid; grid-template-columns: 1fr 1fr; }
            .bbc-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .bbc-header .logo { font-size: 1.3rem; }
            .bbc-header .search-input { width: 120px; font-size: 0.75rem; padding: 5px 12px 5px 30px; }
            .bbc-header .search-input:focus { width: 140px; }
            .bbc-hero .side-stories { grid-template-columns: 1fr; }
            .bbc-grid { grid-template-columns: 1fr; }
            .bbc-nav .nav-link { font-size: 0.6rem; padding: 8px 10px !important; }
            .bbc-category-hero { flex-direction: column; text-align: center; }
        }
    </style>
</head>

<script>
// ============================================================
//  NEWZYY — BBC-INSPIRED SCRIPT (Clean, No Emojis)
// ============================================================

// ===== BACKEND API =====
const API_BASE = 'https://newzyy.onrender.com';
let allNews = [];
let currentFilter = 'all';
let displayCount = 6;
let articleViews = JSON.parse(localStorage.getItem('articleViews') || '{}');

// ===== CATEGORIES =====
const CATEGORIES = ['politics', 'technology', 'sports', 'business', 'health', 'science', 'entertainment', 'travel', 'environment', 'culture', 'world', 'economy'];
const CATEGORY_COLORS = {
    politics: '#b80000',
    technology: '#2563eb',
    sports: '#16a34a',
    business: '#7c3aed',
    health: '#0891b2',
    science: '#d97706',
    entertainment: '#dc2626',
    travel: '#0ea5e9',
    environment: '#22c55e',
    culture: '#8b5cf6',
    world: '#3b82f6',
    economy: '#f59e0e'
};
const CATEGORY_NAMES = {
    politics: 'Politics',
    technology: 'Technology',
    sports: 'Sports',
    business: 'Business',
    health: 'Health',
    science: 'Science',
    entertainment: 'Entertainment',
    travel: 'Travel',
    environment: 'Earth',
    culture: 'Culture',
    world: 'World',
    economy: 'Economy'
};

// ===== ACCOUNT LINKS =====
function updateAccountLinks() {
    const loggedIn = JSON.parse(localStorage.getItem('newzyy_logged_in') || 'null');
    const container = document.getElementById('accountLinks');
    if (!container) return;
    if (loggedIn) {
        const initials = loggedIn.name.charAt(0).toUpperCase();
        container.innerHTML = `
            <div class="user-profile">
                <div class="avatar">${initials}</div>
                <span class="username">${loggedIn.name}</span>
                <button class="btn-logout" onclick="logoutUser()">Logout</button>
            </div>
        `;
    } else {
        container.innerHTML = `
            <a href="account.html" class="btn-login">Log In</a>
            <a href="signup.html" class="btn-signup">Register</a>
        `;
    }
}

function logoutUser() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('newzyy_logged_in');
        location.reload();
    }
}

// ===== UTILITY =====
function getReadingTime(text) {
    const words = (text || '').split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 200));
}

function formatTimeAgo(dateString) {
    if (!dateString) return 'Just now';
    const date = new Date(dateString);
    const now = new Date();
    const diffMins = Math.floor((now - date) / 60000);
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return diffMins + 'm ago';
    const diffHours = Math.floor(diffMins / 60);
    if (diffHours < 24) return diffHours + 'h ago';
    const diffDays = Math.floor(diffHours / 24);
    return diffDays + 'd ago';
}

function trackView(id) {
    articleViews[id] = (articleViews[id] || 0) + 1;
    localStorage.setItem('articleViews', JSON.stringify(articleViews));
}

function getViews(id) {
    return articleViews[id] || 0;
}

function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) {
        t = document.createElement('div');
        t.id = 'toast';
        t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#b80000;color:white;padding:12px 24px;border-radius:0;font-size:0.85rem;z-index:1100;opacity:0;transition:0.3s;font-family:Inter,sans-serif;';
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.transform = 'translateX(-50%) translateY(0)';
    t.style.opacity = '1';
    setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(100px)';
    }, 3000);
}

// ===== FETCH NEWS (FIXED) =====
async function fetchNews() {
    try {
        const res = await fetch(`${API_BASE}/api/all-news?page=1&limit=50`);
        const data = await res.json();
        if (data.success && data.news) {
            allNews = data.news;
            console.log('✅ Loaded ' + allNews.length + ' articles');
        } else {
            allNews = [];
            console.warn('⚠️ No news in response');
        }
    } catch(e) {
        console.error('❌ Fetch error:', e);
        allNews = [];
    }
    displayCount = 6;
    updateTrendingBar();
    renderHero();
    renderAll();
    renderTrendingTopics();
    updateCategoryHero();
}

// ===== TRENDING BAR =====
function updateTrendingBar() {
    const container = document.getElementById('trendingTrack');
    if (!container) return;
    const items = allNews.slice(0, 12);
    if (!items.length) {
        container.innerHTML = '<span class="item">Welcome to Newzyy</span>';
        return;
    }
    container.innerHTML = items.map(a => `
        <span class="item"><a href="#" onclick="openNews('${a.id}'); return false;">${a.title}</a></span>
    `).join('');
}

// ===== CATEGORY HERO =====
function updateCategoryHero() {
    const container = document.getElementById('categoryHero');
    if (!container) return;
    if (currentFilter === 'all') {
        container.style.display = 'none';
        return;
    }
    container.style.display = 'flex';
    const name = CATEGORY_NAMES[currentFilter] || currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1);
    const count = allNews.filter(n => n.category === currentFilter).length;
    document.getElementById('catHeroName').textContent = name;
    document.getElementById('catHeroCount').textContent = count + ' articles';
}

// ===== RENDER HERO =====
function renderHero() {
    const container = document.getElementById('heroSection');
    if (!container || !allNews.length) {
        container.innerHTML = '<div class="text-center py-4 text-muted">No featured news</div>';
        return;
    }
    const featured = allNews[0];
    const side = allNews.slice(1, 5);
    const views = getViews(featured.id);
    
    container.innerHTML = `
        <div class="featured" onclick="openNews('${featured.id}')">
            <img src="${featured.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=800'" loading="lazy">
            <div class="content">
                <span class="category">${featured.category || 'News'}</span>
                <h2 class="title">${featured.title}</h2>
                <div class="meta">
                    ${featured.author || 'Newzyy'} · ${featured.time || 'Just now'} · 
                    <span class="read-time">${getReadingTime(featured.body || featured.excerpt)} min</span>
                    <span class="views"><i class="fa fa-eye"></i> ${views}</span>
                </div>
            </div>
        </div>
        <div class="side-stories">
            ${side.map(a => `
                <div class="side-item" onclick="openNews('${a.id}')">
                    <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=200'" loading="lazy">
                    <div class="side-content">
                        <span class="side-category">${a.category || 'News'}</span>
                        <div class="side-title">${a.title}</div>
                        <div class="side-meta">${a.time || 'Just now'} · <i class="fa fa-eye"></i> ${getViews(a.id)}</div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

// ===== RENDER ALL NEWS =====
function renderAll() {
    let f = currentFilter === 'all' ? allNews : allNews.filter(n => n.category === currentFilter);
    const container = document.getElementById('newsContainer');
    if (!container) return;
    if (!f.length) {
        container.innerHTML = '<div class="text-center py-5"><h4 class="text-muted">No news found</h4></div>';
        document.getElementById('loadMoreBtn').style.display = 'none';
        updateCategoryHero();
        return;
    }
    const pageItems = f.slice(0, displayCount);
    let html = '<div class="bbc-grid">';
    pageItems.forEach(a => {
        const views = getViews(a.id);
        html += `
            <div class="bbc-card" onclick="openNews('${a.id}')">
                <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=400'" loading="lazy">
                <div class="body">
                    <span class="category" style="color:${CATEGORY_COLORS[a.category] || '#b80000'}">${a.category || 'News'}</span>
                    <h3 class="title">${a.title}</h3>
                    <p class="excerpt">${(a.excerpt || a.description || '').substring(0, 120)}...</p>
                    <div class="meta">
                        ${a.author || 'Newzyy'} · ${a.time || 'Just now'}
                        <span class="read-time">${getReadingTime(a.body || a.excerpt)} min</span>
                        <span class="view-count"><i class="fa fa-eye"></i> ${views}</span>
                    </div>
                </div>
            </div>
        `;
    });
    html += '</div>';
    container.innerHTML = html;
    const hasMore = f.length > displayCount;
    document.getElementById('loadMoreBtn').style.display = hasMore ? 'block' : 'none';
    updateCategoryHero();
}

function loadMore() {
    displayCount += 6;
    renderAll();
}

// ===== FILTER CATEGORY =====
function filterCategory(cat) {
    currentFilter = cat;
    displayCount = 6;
    document.querySelectorAll('.bbc-nav .nav-link').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.bbc-nav .nav-link').forEach(el => {
        const text = el.textContent.toLowerCase().trim();
        if (text === cat || (cat === 'all' && text === 'home')) el.classList.add('active');
    });
    renderAll();
    updateCategoryHero();
    showToast((cat === 'all' ? 'All News' : cat.charAt(0).toUpperCase() + cat.slice(1)));
}

// ===== RENDER TRENDING TOPICS =====
function renderTrendingTopics() {
    const container = document.getElementById('trendingTopics');
    if (!container) return;
    const topics = ['Politics', 'Technology', 'Sports', 'Business', 'Health', 'Science', 'Entertainment', 'Travel', 'Environment', 'Culture', 'World', 'Economy', 'AI', 'Climate', 'Space'];
    const shuffled = topics.sort(() => 0.5 - Math.random()).slice(0, 12);
    container.innerHTML = shuffled.map(t => `
        <span class="topic-tag" onclick="filterCategory('${t.toLowerCase()}')">${t}</span>
    `).join('');
}

// ===== SEARCH =====
document.getElementById('searchInput')?.addEventListener('input', function(e) {
    const q = e.target.value.toLowerCase().trim();
    if (q.length < 2) { filterCategory('all'); return; }
    const results = allNews.filter(a => a.title.toLowerCase().includes(q) || (a.category && a.category.toLowerCase().includes(q)));
    const container = document.getElementById('newsContainer');
    if (!results.length) {
        container.innerHTML = '<div class="text-center py-5"><h4>No results found</h4></div>';
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
    }
    let html = `<h4 class="mb-3">Results (${results.length})</h4><div class="bbc-grid">`;
    results.slice(0, 12).forEach(a => {
        const views = getViews(a.id);
        html += `
            <div class="bbc-card" onclick="openNews('${a.id}')">
                <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=400'" loading="lazy">
                <div class="body">
                    <span class="category" style="color:${CATEGORY_COLORS[a.category] || '#b80000'}">${a.category || 'News'}</span>
                    <h3 class="title">${a.title}</h3>
                    <div class="meta">
                        ${a.author || 'Newzyy'} · ${a.time || 'Just now'}
                        <span class="view-count"><i class="fa fa-eye"></i> ${views}</span>
                    </div>
                </div>
            </div>
        `;
    });
    html += '</div>';
    container.innerHTML = html;
    document.getElementById('loadMoreBtn').style.display = 'none';
});

// ===== OPEN NEWS =====
function openNews(id) {
    trackView(id);
    window.location.href = 'single-post.html?id=' + id;
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
    updateAccountLinks();
    fetchNews();
});

window.filterCategory = filterCategory;
window.openNews = openNews;
window.loadMore = loadMore;
window.logoutUser = logoutUser;
</script>
