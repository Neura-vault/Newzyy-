        :root {
            --newzyy-red: #e8380d;
            --newzyy-dark: #0a0a0a;

            --newzyy-muted: #6a6a6a;

        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--newzyy-light); color: var(--newzyy-text); }

        /* ===== HEADER ===== */
        .n-header {

        .n-header .search-input {

        }
        .n-header .search-wrapper { position: relative; }

<script>
// ============================================================
//  NEWZYY — BBC-INSPIRED PROFESSIONAL SCRIPT
// ============================================================

// ===== BACKEND API =====
const API_BASE = 'https://newzyy.onrender.com';
let allNews = [];
let currentFilter = 'all';
let displayCount = 6;

// ===== CATEGORIES =====
const CATEGORIES = ['politics', 'technology', 'sports', 'business', 'health', 'science', 'entertainment', 'travel', 'environment', 'culture', 'world', 'economy'];
const CATEGORY_COLORS = {
    politics: '#e8380d',
    technology: '#2563eb',
    sports: '#16a34a',
    business: '#7c3aed',
    health: '#0891b2',
    science: '#d97706',
    entertainment: '#dc2626',
    travel: '#0ea5e9',
    environment: '#22c55e',
    culture: '#8b5cf6',
    world: '#3b82f6',
    economy: '#f59e0b'
};

// ===== ACCOUNT LINKS =====
function updateAccountLinks() {
    const loggedIn = JSON.parse(localStorage.getItem('newzyy_logged_in') || 'null');
    const container = document.getElementById('accountLinks');
    if (!container) return;
    if (loggedIn) {
        const initials = loggedIn.name.charAt(0).toUpperCase();
        container.innerHTML = `
            <div class="user-profile">
                <div class="avatar">${initials}</div>
                <span class="username">${loggedIn.name}</span>
                <button class="btn-logout" onclick="logoutUser()">Logout</button>
            </div>
        `;
    } else {
        container.innerHTML = `
            <a href="account.html" class="btn-login">Log In</a>
            <a href="signup.html" class="btn-signup">Register</a>
        `;
    }
}

function logoutUser() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('newzyy_logged_in');
        location.reload();
    }
}

// ===== UTILITY =====
function getReadingTime(text) {
    const words = (text || '').split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 200));
}

function formatTimeAgo(dateString) {
    if (!dateString) return 'Just now';
    const date = new Date(dateString);
    const now = new Date();
    const diffMins = Math.floor((now - date) / 60000);
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return diffMins + 'm ago';
    const diffHours = Math.floor(diffMins / 60);
    if (diffHours < 24) return diffHours + 'h ago';
    const diffDays = Math.floor(diffHours / 24);
    return diffDays + 'd ago';
}

function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) {
        t = document.createElement('div');
        t.id = 'toast';
        t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#e8380d;color:white;padding:12px 24px;border-radius:40px;font-size:0.85rem;z-index:1100;opacity:0;transition:0.3s;';
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.transform = 'translateX(-50%) translateY(0)';
    t.style.opacity = '1';
    setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(100px)';
    }, 3000);
}

// ===== FETCH NEWS =====
async function fetchNews() {
    try {
        const res = await fetch(`${API_BASE}/api/all-news`);
        const data = await res.json();
        if (data.success && data.news) {
            allNews = data.news;
            console.log('✅ Loaded ' + allNews.length + ' articles');
        } else {
            allNews = [];
        }
    } catch(e) {
        console.error('❌ Fetch error:', e);
        allNews = [];
    }
    displayCount = 6;
    renderHero();
    renderAll();
    updateTicker();
    renderTrending();
}

// ===== RENDER HERO (BBC Style) =====
function renderHero() {
    const container = document.getElementById('heroSection');
    if (!container || !allNews.length) {
        container.innerHTML = '<div class="text-center py-4 text-muted">No featured news</div>';
        return;
    }
    const featured = allNews[0];
    const side = allNews.slice(1, 5);
    
    container.innerHTML = `
        <div class="featured" onclick="openNews('${featured.id}')">
            <img src="${featured.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=800'" loading="lazy">
            <div class="content">
                <span class="category">${featured.category || 'News'}</span>
                <h2 class="title">${featured.title}</h2>
                <div class="meta">${featured.author || 'Newzyy'} · ${featured.time || 'Just now'} · ${getReadingTime(featured.body || featured.excerpt)} min read</div>
            </div>
        </div>
        <div class="side-stories">
            ${side.map(a => `
                <div class="side-item" onclick="openNews('${a.id}')">
                    <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=200'" loading="lazy">
                    <div class="side-content">
                        <span class="side-category">${a.category || 'News'}</span>
                        <div class="side-title">${a.title}</div>
                        <div class="side-meta">${a.time || 'Just now'}</div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

// ===== RENDER ALL NEWS =====
function renderAll() {
    let f = currentFilter === 'all' ? allNews : allNews.filter(n => n.category === currentFilter);
    const container = document.getElementById('newsContainer');
    if (!container) return;
    if (!f.length) {
        container.innerHTML = '<div class="text-center py-5"><h4 class="text-muted">No news found</h4></div>';
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
    }
    const pageItems = f.slice(0, displayCount);
    let html = '<div class="n-grid">';
    pageItems.forEach(a => {
        html += `
            <div class="n-card" onclick="openNews('${a.id}')">
                <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=400'" loading="lazy">
                <div class="body">
                    <span class="category" style="color:${CATEGORY_COLORS[a.category] || '#e8380d'}">${a.category || 'News'}</span>
                    <h3 class="title">${a.title}</h3>
                    <p class="excerpt">${(a.excerpt || a.description || '').substring(0, 120)}...</p>
                    <div class="meta">${a.author || 'Newzyy'} · ${a.time || 'Just now'} · ${getReadingTime(a.body || a.excerpt)} min</div>
                </div>
            </div>
        `;
    });
    html += '</div>';
    container.innerHTML = html;
    const hasMore = f.length > displayCount;
    document.getElementById('loadMoreBtn').style.display = hasMore ? 'block' : 'none';
}

function loadMore() {
    displayCount += 6;
    renderAll();
}

// ===== FILTER CATEGORY =====
function filterCategory(cat) {
    currentFilter = cat;
    displayCount = 6;
    document.querySelectorAll('.n-nav .nav-link').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.n-nav .nav-link').forEach(el => {
        const text = el.textContent.toLowerCase().trim();
        if (text === cat || (cat === 'all' && text === 'home')) el.classList.add('active');
    });
    renderAll();
    showToast('📰 ' + (cat === 'all' ? 'All News' : cat.charAt(0).toUpperCase() + cat.slice(1)));
}

// ===== UPDATE TICKER =====
function updateTicker() {
    const container = document.getElementById('tickerContainer');
    if (!container) return;
    const items = allNews.slice(0, 10);
    if (!items.length) {
        container.innerHTML = '<div class="item"><div class="post-content"><h2 class="post-title title-sm"><a href="#">Welcome to Newzyy</a></h2></div></div>';
        return;
    }
    container.innerHTML = items.map(a => `
        <div class="item">
            <div class="post-content">
                <h2 class="post-title title-sm">
                    <a href="#" onclick="openNews('${a.id}'); return false;">${a.title}</a>
                </h2>
            </div>
        </div>
    `).join('');
    if (typeof $ !== 'undefined' && $('.trending-news-slider').length) {
        $('.trending-news-slider').slick('refresh');
    }
}

// ===== RENDER TRENDING TOPICS =====
function renderTrending() {
    const container = document.getElementById('trendingTopics');
    if (!container) return;
    const topics = ['Politics', 'Technology', 'Sports', 'Business', 'Health', 'Science', 'Entertainment', 'Travel', 'Environment', 'Culture', 'World', 'Economy'];
    const shuffled = topics.sort(() => 0.5 - Math.random()).slice(0, 10);
    container.innerHTML = shuffled.map(t => `
        <span class="topic-tag" onclick="filterCategory('${t.toLowerCase()}')">#${t}</span>
    `).join('');
}

// ===== SEARCH =====
document.getElementById('searchInput')?.addEventListener('input', function(e) {
    const q = e.target.value.toLowerCase().trim();
    if (q.length < 2) { filterCategory('all'); return; }
    const results = allNews.filter(a => a.title.toLowerCase().includes(q) || (a.category && a.category.toLowerCase().includes(q)));
    const container = document.getElementById('newsContainer');
    if (!results.length) {
        container.innerHTML = '<div class="text-center py-5"><h4>🔍 No results found</h4></div>';
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
    }
    let html = `<h4 class="mb-3">🔍 Results (${results.length})</h4><div class="n-grid">`;
    results.slice(0, 12).forEach(a => {
        html += `
            <div class="n-card" onclick="openNews('${a.id}')">
                <img src="${a.image}" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=400'" loading="lazy">
                <div class="body">
                    <span class="category" style="color:${CATEGORY_COLORS[a.category] || '#e8380d'}">${a.category || 'News'}</span>
                    <h3 class="title">${a.title}</h3>
                    <div class="meta">${a.author || 'Newzyy'} · ${a.time || 'Just now'}</div>
                </div>
            </div>
        `;
    });
    html += '</div>';
    container.innerHTML = html;
    document.getElementById('loadMoreBtn').style.display = 'none';
});

// ===== OPEN NEWS =====
function openNews(id) {
    window.location.href = 'single-post.html?id=' + id;
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
    updateAccountLinks();
    fetchNews();
});

window.filterCategory = filterCategory;
window.openNews = openNews;
window.loadMore = loadMore;
window.logoutUser = logoutUser;
</script>

</body>
