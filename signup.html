<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Newzyy</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .signup-container { max-width: 420px; width: 100%; background: #ffffff; border-radius: 16px; padding: 40px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid #e8e4df; }
        .signup-container h2 { font-size: 1.8rem; font-weight: 700; color: #0a0a0a; text-align: center; margin-bottom: 8px; }
        .signup-container .sub { text-align: center; color: #6a6a6a; font-size: 0.9rem; margin-bottom: 28px; }
        .signup-container .logo { text-align: center; margin-bottom: 20px; }
        .signup-container .logo img { max-height: 45px; width: auto; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; color: #0a0a0a; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e8e4df; border-radius: 10px; font-size: 0.95rem; outline: none; transition: 0.3s; background: #fafaf8; }
        .form-group input:focus { border-color: #e8380d; box-shadow: 0 0 0 3px rgba(232,56,13,0.1); }
        .btn-primary { width: 100%; padding: 14px; background: #e8380d; border: none; border-radius: 40px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #c42e09; }
        .footer-text { text-align: center; margin-top: 18px; font-size: 0.9rem; color: #4a4a4a; }
        .footer-text a { color: #e8380d; font-weight: 600; text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
        .message { text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .message.error { color: #dc2626; }
        .message.success { color: #16a34a; }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo">
        <a href="index.html">
            <img src="images/logos/logo.png" alt="Newzyy">
        </a>
    </div>
    <h2>Create Account</h2>
    <p class="sub">Join Newzyy and stay informed</p>

    <form id="signupForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signupEmail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Create password (min 6 chars)" required minlength="6">
        </div>

        <button type="submit" class="btn-primary">Sign Up →</button>

        <div id="signupMessage" class="message"></div>

        <p class="footer-text">
            Already have an account? <a href="account.html">Log In</a>
        </p>
    </form>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const msgDiv = document.getElementById('signupMessage');
    
    if (!name || !email || !password) {
        msgDiv.className = 'message error';
        msgDiv.textContent = '❌ Please fill all fields';
        return;
    }
    
    let users = JSON.parse(localStorage.getItem('newzyy_users') || '[]');
    
    if (users.find(u => u.email === email)) {
        msgDiv.className = 'message error';
        msgDiv.textContent = '❌ Email already registered! Please login.';
        return;
    }
    
    users.push({ name, email, password, joined: new Date().toISOString() });
    localStorage.setItem('newzyy_users', JSON.stringify(users));
    
    msgDiv.className = 'message success';
    msgDiv.textContent = '✅ Account created! Redirecting to login...';
    
    setTimeout(() => {
        window.location.href = 'account.html';
    }, 1500);
});
</script>

</body>
</html>
