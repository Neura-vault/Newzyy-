<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Log In — Newzyy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="plugins/font-awesome/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Serif+4:opsz,wght@8..60,700&display=swap" rel="stylesheet">
    <style>
        :root { --red:#b80000; --ink:#141414; --paper:#ffffff; --canvas:#f7f6f2; --hairline:#e3ded3; --muted:#6e6a62;
            --sans:'Inter',sans-serif; --serif:'Source Serif 4',Georgia,serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--sans); background:var(--canvas); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .logo { font-size:1.6rem; font-weight:900; margin-bottom:30px; text-decoration:none; color:var(--ink); }
        .logo span { color:var(--red); }
        .auth-card { background:var(--paper); border:1px solid var(--hairline); padding:36px 32px; width:100%; max-width:380px; }
        .auth-card h1 { font-family:var(--serif); font-size:1.5rem; margin-bottom:6px; }
        .auth-card .sub { font-size:0.85rem; color:var(--muted); margin-bottom:24px; }
        .auth-card label { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:6px; }
        .auth-card input { width:100%; padding:11px 13px; border:1px solid var(--hairline); font-size:0.9rem; margin-bottom:16px; font-family:var(--sans); }
        .code-input { text-align:center; font-size:1.4rem; letter-spacing:8px; font-weight:700; }
        .btn-primary { width:100%; padding:12px; background:var(--red); color:#fff; border:none; font-weight:700; text-transform:uppercase; font-size:0.8rem; letter-spacing:0.5px; cursor:pointer; }
        .btn-primary:hover { opacity:0.9; }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
        .btn-text { background:none; border:none; color:var(--red); font-weight:600; font-size:0.82rem; cursor:pointer; margin-top:12px; display:block; width:100%; text-align:center; }
        .footer-text { text-align:center; font-size:0.85rem; margin-top:18px; color:var(--muted); }
        .footer-text a { color:var(--red); font-weight:600; }
        .message { margin-top:14px; font-size:0.85rem; text-align:center; }
        .message.success { color:#16a34a; }
        .message.error { color:var(--red); }
        .logged-in-box { text-align:center; }
        .logged-in-box h3 { font-family:var(--serif); font-size:1.15rem; margin-bottom:16px; font-weight:600; }
        .btn-logout { width:100%; padding:11px; background:transparent; border:1px solid var(--hairline); margin-top:10px; font-weight:600; font-size:0.8rem; cursor:pointer; }
        #verifyStep { display:none; }
    </style>
</head>
<body>
    <a href="index.html" class="logo">Newzy<span>y</span></a>

    <div class="auth-card" id="loginStep">
        <div id="loginContent">
            <h1>Welcome back</h1>
            <div class="sub">Log in to your Newzyy account</div>
            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required>
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Your password" required>
                <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
                <div id="loginMessage" class="message"></div>
                <p class="footer-text">Don't have an account? <a href="signup.html">Sign up</a></p>
            </form>
        </div>
    </div>

    <div class="auth-card" id="verifyStep">
        <h1>Verify your email</h1>
        <div class="sub">We sent a 6-digit code to <strong id="verifyEmailDisplay"></strong></div>
        <form id="verifyForm">
            <label>Verification code</label>
            <input type="text" id="verifyCode" class="code-input" placeholder="000000" maxlength="6" required>
            <button type="submit" class="btn-primary" id="verifyBtn">Verify & Log In</button>
            <div id="verifyMessage" class="message"></div>
            <button type="button" class="btn-text" id="resendBtn">Resend code</button>
        </form>
    </div>

    <script>
        const API_BASE = 'https://newzyy.onrender.com';
        let pendingEmail = '';
        let pendingPassword = '';

        const loggedIn = JSON.parse(localStorage.getItem('newzyy_logged_in') || 'null');
        if (loggedIn) {
            document.getElementById('loginContent').innerHTML = `
                <div class="logged-in-box">
                    <h3>You're already logged in as ${loggedIn.name}</h3>
                    <a href="index.html" class="btn-primary" style="display:block;text-decoration:none;text-align:center;">Go to Homepage</a>
                    <button class="btn-logout" onclick="logoutUser()">Log Out</button>
                </div>
            `;
        }

        document.getElementById('loginForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMessage');
            const btn = document.getElementById('loginBtn');

            btn.disabled = true; btn.textContent = 'Logging in...';
            msgDiv.className = 'message'; msgDiv.textContent = '';

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('newzyy_token', data.token);
                    localStorage.setItem('newzyy_logged_in', JSON.stringify(data.user));
                    msgDiv.className = 'message success';
                    msgDiv.textContent = 'Welcome back! Redirecting...';
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else if (data.needsVerification) {
                    pendingEmail = email;
                    document.getElementById('verifyEmailDisplay').textContent = email;
                    document.getElementById('loginStep').style.display = 'none';
                    document.getElementById('verifyStep').style.display = 'block';
                    // send a fresh code automatically since they're already here
                    fetch(`${API_BASE}/api/auth/resend-code`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    }).catch(() => {});
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = data.message || 'Invalid email or password.';
                }
            } catch (e) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Could not reach the server. Please try again.';
            }
            btn.disabled = false; btn.textContent = 'Log In';
        });

        document.getElementById('verifyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const code = document.getElementById('verifyCode').value.trim();
            const msgDiv = document.getElementById('verifyMessage');
            const btn = document.getElementById('verifyBtn');

            btn.disabled = true; btn.textContent = 'Verifying...';
            msgDiv.className = 'message'; msgDiv.textContent = '';

            try {
                const res = await fetch(`${API_BASE}/api/auth/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('newzyy_token', data.token);
                    localStorage.setItem('newzyy_logged_in', JSON.stringify(data.user));
                    msgDiv.className = 'message success';
                    msgDiv.textContent = 'Verified! Redirecting...';
                    setTimeout(() => { window.location.href = 'index.html'; }, 800);
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = data.message || 'Incorrect code.';
                }
            } catch (e) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Could not reach the server. Please try again.';
            }
            btn.disabled = false; btn.textContent = 'Verify & Log In';
        });

        document.getElementById('resendBtn').addEventListener('click', async function() {
            const msgDiv = document.getElementById('verifyMessage');
            this.disabled = true; this.textContent = 'Sending...';
            try {
                const res = await fetch(`${API_BASE}/api/auth/resend-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail })
                });
                const data = await res.json();
                msgDiv.className = data.success ? 'message success' : 'message error';
                msgDiv.textContent = data.message;
            } catch (e) {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Could not reach the server.';
            }
            this.disabled = false; this.textContent = 'Resend code';
        });

        function logoutUser() {
            if (confirm('Are you sure you want to log out?')) {
                localStorage.removeItem('newzyy_logged_in');
                localStorage.removeItem('newzyy_token');
                location.reload();
            }
        }
    </script>
</body>
</html>
