<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — Newzyy</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { max-width: 420px; width: 100%; background: #ffffff; border-radius: 16px; padding: 40px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid #e8e4df; }
        .login-container h2 { font-size: 1.8rem; font-weight: 700; color: #0a0a0a; text-align: center; margin-bottom: 8px; }
        .login-container .sub { text-align: center; color: #6a6a6a; font-size: 0.9rem; margin-bottom: 28px; }
        .login-container .logo { text-align: center; margin-bottom: 20px; }
        .login-container .logo img { max-height: 45px; width: auto; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; color: #0a0a0a; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e8e4df; border-radius: 10px; font-size: 0.95rem; outline: none; transition: 0.3s; background: #fafaf8; }
        .form-group input:focus { border-color: #e8380d; box-shadow: 0 0 0 3px rgba(232,56,13,0.1); }
        .btn-primary { width: 100%; padding: 14px; background: #e8380d; border: none; border-radius: 40px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #c42e09; }
        .footer-text { text-align: center; margin-top: 18px; font-size: 0.9rem; color: #4a4a4a; }
        .footer-text a { color: #e8380d; font-weight: 600; text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }
        .message { text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .message.error { color: #dc2626; }
        .message.success { color: #16a34a; }
        .logged-in-box { text-align: center; padding: 20px 0; }
        .logged-in-box h3 { font-size: 1.2rem; color: #0a0a0a; }
        .logged-in-box h3 strong { color: #e8380d; }
        .logged-in-box .btn-logout { background: none; border: none; color: #dc2626; cursor: pointer; text-decoration: underline; font-size: 0.9rem; margin-top: 10px; }
        .logged-in-box .btn-logout:hover { color: #991b1b; }
    </style>
</head>
<body>

<div class="login-container" id="loginContainer">
    <div class="logo">
        <a href="index.html">
            <img src="images/logos/logo.png" alt="Newzyy">
        </a>
    </div>
    <h2>Welcome Back</h2>
    <p class="sub">Log in to your Newzyy account</p>

    <div id="loginContent">
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-primary">Log In →</button>

            <div id="loginMessage" class="message"></div>

            <p class="footer-text">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </p>
        </form>
    </div>
</div>

<script>
// ===== CHECK IF ALREADY LOGGED IN =====
const loggedIn = JSON.parse(localStorage.getItem('newzyy_logged_in') || 'null');

if (loggedIn) {
    document.getElementById('loginContent').innerHTML = `
        <div class="logged-in-box">
            <h3>👋 You are already logged in as <strong>${loggedIn.name}</strong></h3>
            <a href="index.html" class="btn-primary" style="display:inline-block; text-align:center; text-decoration:none; margin-top:16px;">Go to Homepage</a>
            <br>
            <button class="btn-logout" onclick="logoutUser()">🚪 Logout</button>
        </div>
    `;
}

// ===== LOGIN LOGIC =====
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msgDiv = document.getElementById('loginMessage');
    
    let users = JSON.parse(localStorage.getItem('newzyy_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);
    
    if (user) {
        localStorage.setItem('newzyy_logged_in', JSON.stringify({ name: user.name, email: user.email }));
        msgDiv.className = 'message success';
        msgDiv.textContent = '✅ Welcome back, ' + user.name + '! Redirecting...';
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1000);
    } else {
        msgDiv.className = 'message error';
        msgDiv.textContent = '❌ Invalid email or password!';
    }
});

// ===== LOGOUT FUNCTION =====
function logoutUser() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('newzyy_logged_in');
        location.reload();
    }
}
</script>

</body>
</html>
