<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Log In — Newzyy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="plugins/font-awesome/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Serif+4:opsz,wght@8..60,700&display=swap" rel="stylesheet">
    <style>
        :root { --red:#b80000; --ink:#141414; --paper:#ffffff; --canvas:#f7f6f2; --hairline:#e3ded3; --muted:#6e6a62;
            --sans:'Inter',sans-serif; --serif:'Source Serif 4',Georgia,serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--sans); background:var(--canvas); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .logo { font-size:1.6rem; font-weight:900; margin-bottom:30px; text-decoration:none; color:var(--ink); }
        .logo span { color:var(--red); }
        .auth-card { background:var(--paper); border:1px solid var(--hairline); padding:36px 32px; width:100%; max-width:380px; }
        .auth-card h1 { font-family:var(--serif); font-size:1.5rem; margin-bottom:6px; }
        .auth-card .sub { font-size:0.85rem; color:var(--muted); margin-bottom:24px; }
        .auth-card label { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:6px; }
        .auth-card input { width:100%; padding:11px 13px; border:1px solid var(--hairline); font-size:0.9rem; margin-bottom:16px; font-family:var(--sans); }
        .btn-primary { width:100%; padding:12px; background:var(--red); color:#fff; border:none; font-weight:700; text-transform:uppercase; font-size:0.8rem; letter-spacing:0.5px; cursor:pointer; }
        .btn-primary:hover { opacity:0.9; }
        .footer-text { text-align:center; font-size:0.85rem; margin-top:18px; color:var(--muted); }
        .footer-text a { color:var(--red); font-weight:600; }
        .message { margin-top:14px; font-size:0.85rem; text-align:center; }
        .message.success { color:#16a34a; }
        .message.error { color:var(--red); }
        .logged-in-box { text-align:center; }
        .logged-in-box h3 { font-family:var(--serif); font-size:1.15rem; margin-bottom:16px; font-weight:600; }
        .btn-logout { width:100%; padding:11px; background:transparent; border:1px solid var(--hairline); margin-top:10px; font-weight:600; font-size:0.8rem; cursor:pointer; }
    </style>
</head>
<body>
    <a href="index.html" class="logo">Newzy<span>y</span></a>
    <div class="auth-card" id="loginContent">
        <h1>Welcome back</h1>
        <div class="sub">Log in to your Newzyy account</div>
        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required>
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Your password" required>
            <button type="submit" class="btn-primary">Log In</button>
            <div id="loginMessage" class="message"></div>
            <p class="footer-text">Don't have an account? <a href="signup.html">Sign up</a></p>
        </form>
    </div>

    <script>
        const loggedIn = JSON.parse(localStorage.getItem('newzyy_logged_in') || 'null');
        if (loggedIn) {
            document.getElementById('loginContent').innerHTML = `
                <div class="logged-in-box">
                    <h3>You're already logged in as ${loggedIn.name}</h3>
                    <a href="index.html" class="btn-primary" style="display:block;text-decoration:none;text-align:center;">Go to Homepage</a>
                    <button class="btn-logout" onclick="logoutUser()">Log Out</button>
                </div>
            `;
        }

        document.getElementById('loginForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const msgDiv = document.getElementById('loginMessage');

            let users = JSON.parse(localStorage.getItem('newzyy_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('newzyy_logged_in', JSON.stringify({ name: user.name, email: user.email }));
                msgDiv.className = 'message success';
                msgDiv.textContent = 'Welcome back, ' + user.name + '. Redirecting...';
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } else {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Invalid email or password.';
            }
        });

        function logoutUser() {
            if (confirm('Are you sure you want to log out?')) {
                localStorage.removeItem('newzyy_logged_in');
                location.reload();
            }
        }
    </script>
</body>
</html>
